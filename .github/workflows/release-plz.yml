name: Release PR

on:
    push:
        branches: [master]

permissions:
    contents: write
    pull-requests: write
    actions: write

jobs:
    release-plz:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: Install Nix
              uses: cachix/install-nix-action@v31

            - name: Install native deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config libsystemd-dev

            - name: Run release-plz (create tag)
              id: release
              run: |
                  git tag | sort > /tmp/tags-before.txt
                  nix shell nixpkgs#release-plz -c \
                    release-plz release --git-token $GITHUB_TOKEN
                  git fetch --tags origin
                  NEW_TAG="$(comm -13 /tmp/tags-before.txt <(git tag | sort))"
                  if [ -z "$NEW_TAG" ]; then
                    echo "released=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi
                  echo "released=true" >> "$GITHUB_OUTPUT"
                  gh workflow run release.yml -f tag="$NEW_TAG"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Run release-plz (create/update PR)
              if: steps.release.outputs.released != 'true'
              run: |
                  nix shell nixpkgs#cargo-semver-checks nixpkgs#release-plz -c \
                    release-plz release-pr --git-token $GITHUB_TOKEN --forge github
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
