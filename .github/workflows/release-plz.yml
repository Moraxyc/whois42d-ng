name: Release PR

on:
    push:
        branches: [master]

permissions:
    contents: write
    pull-requests: write

jobs:
    release-plz:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install release-plz
              run: cargo install release-plz

            - name: Run release-plz
              run: release-plz release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
