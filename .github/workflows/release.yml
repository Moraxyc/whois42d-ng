name: Release

on:
    push:
        tags: ["v*"]

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-musl
                      os: ubuntu-latest
                      flags: "--no-default-features"
                    - target: aarch64-unknown-linux-musl
                      os: ubuntu-24.04-arm
                      flags: "--no-default-features"
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      flags: ""
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-24.04-arm
                      flags: ""
                    - target: x86_64-pc-windows-gnu
                      os: ubuntu-latest
                      flags: "--no-default-features"
                    - target: x86_64-apple-darwin
                      os: macos-latest
                      flags: "--no-default-features"
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      flags: "--no-default-features"
                    - target: riscv64gc-unknown-linux-gnu
                      os: ubuntu-latest
                      flags: "--no-default-features"

        steps:
            - uses: actions/checkout@v7

            - name: Add Rust target
              run: rustup target add ${{ matrix.target }}

            - name: Install Linux build dependencies
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install -y musl-tools gcc-riscv64-linux-gnu mingw-w64

            - name: Install systemd dev library
              if: runner.os == 'Linux' && matrix.flags == ''
              run: sudo apt-get install -y libsystemd-dev

            - name: Build (Linux)
              if: runner.os == 'Linux'
              run: cargo build --release --target ${{ matrix.target }} ${{ matrix.flags }}
              env:
                  CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
                  CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc

            - name: Build (macOS)
              if: runner.os == 'macOS'
              run: cargo build --release --target ${{ matrix.target }} ${{ matrix.flags }}

            - name: Package
              env:
                  TARGET: ${{ matrix.target }}
              run: |
                  dir="whois42d-ng-${TARGET}"
                  bin="whois42d-ng"
                  case "${TARGET}" in
                    *windows*) bin="whois42d-ng.exe" ;;
                  esac
                  mkdir -p "stage/${dir}"
                  cp "target/${TARGET}/release/${bin}" "stage/${dir}/"
                  cp LICENSE README.md "stage/${dir}/"
                  case "${TARGET}" in
                    *windows*)
                      (cd stage && zip -r "../${dir}.zip" "${dir}")
                      sha256sum "${dir}.zip" > "${dir}.zip.sha256"
                      ;;
                    *)
                      tar -C stage -czf "${dir}.tar.gz" "${dir}"
                      sha256sum "${dir}.tar.gz" > "${dir}.tar.gz.sha256"
                      ;;
                  esac

            - name: Set artifact file name
              id: artifact_name
              run: |
                  case "${{ matrix.target }}" in
                    *windows*) echo "suffix=zip" >> "$GITHUB_OUTPUT" ;;
                    *)         echo "suffix=tar.gz" >> "$GITHUB_OUTPUT" ;;
                  esac

            - uses: actions/upload-artifact@v7
              with:
                  name: whois42d-ng-${{ matrix.target }}
                  path: |
                      whois42d-ng-${{ matrix.target }}.${{ steps.artifact_name.outputs.suffix }}
                      whois42d-ng-${{ matrix.target }}.${{ steps.artifact_name.outputs.suffix }}.sha256

    release:
        name: Publish GitHub Release
        needs: build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7

            - uses: actions/download-artifact@v8
              with:
                  path: artifacts
                  pattern: whois42d-ng-*
                  merge-multiple: true

            - name: Extract changelog section
              id: notes
              run: |
                  VERSION="${GITHUB_REF#refs/tags/v}"
                  NOTES_FILE="$(mktemp)"
                  if [ -f CHANGELOG.md ]; then
                    awk -v v="$VERSION" '
                      $0 ~ "^## \\[?" v "\\]?" { flag=1; next }
                      /^## \[/ { if (flag) exit }
                      flag { print }
                    ' CHANGELOG.md > "$NOTES_FILE"
                  fi
                  [ -s "$NOTES_FILE" ] || echo "Release ${VERSION}" > "$NOTES_FILE"
                  echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

            - name: Create release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NOTES_PATH: ${{ steps.notes.outputs.path }}
              run: |
                  gh release create "${GITHUB_REF#refs/tags/}" \
                    --title "${GITHUB_REF#refs/tags/}" \
                    --notes-file "$NOTES_PATH" \
                    artifacts/*
